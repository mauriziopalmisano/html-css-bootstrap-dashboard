<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aggiungi libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="./style/index.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
            <div class="container-fluid px-4">
                <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
                    <img src="./img/duck.png" alt="Logo" class="header-logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                    aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="./index-offcanvas.html">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="./anagrafica-utenti.html">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex gap-2" role="search">
                        <input class="form-control" type="search" placeholder="Cerca...">
                        <button class="btn btn-outline-light" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container ">
            <h1>Nuovo Libro</h1>
            <form action="" method="post">
                <div class="row g-4 mt-1">
                    <div class="col-12">
                    </div>
                    <div class="col-6">
                        <label for="nome" class="form-label fs-5 fw-medium">Nome Autore</label>
                        <input required type="text" class="form-control form-control-lg"
                            placeholder="Inserisci il nome dell'autore" id="nome" aria-label="Nome">
                    </div>
                    <div class="col-6">
                        <label for="cognome" class="form-label fs-5 fw-medium">Cognome Autore</label>
                        <input required type="text" class="form-control form-control-lg"
                            placeholder="Inserisci il cognome dell'autore" id="cognome" aria-label="Cognome">
                    </div>
                    <div class="col-12">
                        <label for="titolo" class="form-label fs-5 fw-medium">Titolo</label>
                        <input required type="text" class="form-control form-control-lg"
                            placeholder="Inserisci il titolo del libro" id="titolo" aria-label="Titolo">
                        <span class="form-text">Titolo versione italiana</span>
                    </div>
                    <div class="col-12 col-lg-4">
                        <label for="genere" class="form-label fs-5 fw-medium">Genere</label>
                        <select class="form-select form-select-lg" aria-label="selezione del genere autore" id="genere">
                            <option disabled value="" selected>Scegli il genere</option>
                            <option value="Man">Uomo</option>
                            <option value="Woman">Donna</option>
                            <option value="not-spec">Non specificare</option>
                        </select>
                    </div>
                    <div class="col-12 col-lg-4">
                        <label for="anno" class="form-label fs-5 fw-medium">Anno di Pubblicazione</label>
                        <input required type="number" class="form-control form-control-lg" id="anno"
                            placeholder="Inserisci l'anno" min="1450" max="2026">
                    </div>
                    <div class="col-12 col-lg-4">
                        <label for="isbn" class="form-label fs-5 fw-medium">ISBN#</label>
                        <input required type="text" id="isbn" class="form-control form-control-lg"
                            placeholder="Inserisci il codice ISBN#">
                    </div>
                    <hr class="my-5">
                    <div class="col-12 d-flex flex-column">
                        <label for="note" class="form-label fs-5 fw-medium">Note</label>
                        <textarea class="form-control-lg" id="note" rows="5"
                            placeholder="Inserisci eventuali note sul libro"></textarea>
                        <div class="form-check my-3">
                            <input class="form-check-input" type="checkbox" id="digitale">
                            <label class="form-check-label" for="digitale">Disponibile in digitale</label>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary">Aggiungi Libro</button>
                </div>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
    <script> /*trovato con l'IA per rispettare la struttura isbn nell'input*/
        new Cleave('#isbn', {
            delimiter: '-',
            blocks: [3, 2, 2, 5, 1], // struttura ISBN-13
        });
    </script>
</body>
